<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNIP — URL Shortener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111; --border: #222;
      --accent: #e8ff47; --accent2: #ff4757;
      --text: #f0f0f0; --muted: #555; --radius: 6px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; overflow-x: hidden; }
    body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events:none; z-index:999; opacity:.4; }

    .container { max-width: 860px; margin: 0 auto; padding: 0 24px; }

    /* ── HEADER ── */
    header { padding: 28px 0 0; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 26px; font-weight: 800; letter-spacing: -1px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4);opacity:.7} }

    .header-right { display: flex; align-items: center; gap: 10px; }

    /* ── NAV ── */
    nav { display: flex; gap: 6px; }
    .nav-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: var(--radius); font-family: 'Syne', sans-serif; font-size: 13px; cursor: pointer; transition: all .2s; }
    .nav-btn:hover, .nav-btn.active { border-color: var(--accent); color: var(--accent); }

    /* ── USER MENU ── */
    .user-chip { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 6px 14px 6px 6px; cursor: pointer; transition: border-color .2s; position: relative; }
    .user-chip:hover { border-color: var(--accent); }
    .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #0a0a0a; overflow: hidden; }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-name { font-size: 13px; font-weight: 600; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dropdown { position: absolute; top: calc(100% + 8px); right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); min-width: 160px; z-index: 50; overflow: hidden; display: none; animation: fadeUp .2s ease; }
    .dropdown.open { display: block; }
    .dropdown-item { padding: 11px 16px; font-size: 13px; cursor: pointer; transition: background .15s; display: block; width: 100%; text-align: left; background: none; border: none; color: var(--text); font-family: 'Syne', sans-serif; }
    .dropdown-item:hover { background: var(--border); }
    .dropdown-item.danger { color: var(--accent2); }
    .dropdown-divider { border: none; border-top: 1px solid var(--border); }

    .btn-login { background: var(--accent); color: #0a0a0a; border: none; padding: 9px 20px; border-radius: var(--radius); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; transition: all .2s; }
    .btn-login:hover { box-shadow: 0 4px 14px rgba(232,255,71,.3); }

    /* ── VIEWS ── */
    .view { display: none; }
    .view.active { display: block; }

    /* ── AUTH MODAL ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.85); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; backdrop-filter: blur(6px); }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 40px; width: 100%; max-width: 420px; animation: fadeUp .3s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

    .modal-logo { text-align: center; font-size: 22px; font-weight: 800; letter-spacing: -1px; margin-bottom: 6px; }
    .modal-sub { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 32px; }
    .modal-tabs { display: flex; gap: 4px; background: var(--bg); border-radius: var(--radius); padding: 4px; margin-bottom: 28px; }
    .modal-tab { flex: 1; padding: 9px; border: none; background: transparent; color: var(--muted); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 4px; transition: all .2s; }
    .modal-tab.active { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

    .form-group { margin-bottom: 16px; }
    .form-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; display: block; }
    .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 13px 14px; border-radius: var(--radius); font-family: 'DM Mono', monospace; font-size: 14px; transition: border-color .2s, box-shadow .2s; outline: none; }
    .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,255,71,.08); }
    .form-input::placeholder { color: var(--muted); }

    .btn-primary { width: 100%; background: var(--accent); color: #0a0a0a; border: none; padding: 14px; border-radius: var(--radius); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; transition: all .2s; margin-top: 4px; }
    .btn-primary:hover { box-shadow: 0 6px 20px rgba(232,255,71,.25); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

    .divider-or { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--muted); font-size: 12px; }
    .divider-or::before, .divider-or::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .btn-google { width: 100%; background: transparent; border: 1px solid var(--border); color: var(--text); padding: 13px; border-radius: var(--radius); font-family: 'Syne', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-google:hover { border-color: #4285f4; color: #4285f4; }
    .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }

    .auth-error { background: rgba(255,71,87,.08); border: 1px solid rgba(255,71,87,.3); border-radius: var(--radius); padding: 11px 14px; color: var(--accent2); font-size: 13px; margin-bottom: 16px; display: none; }
    .auth-error.show { display: block; }

    .modal-close-x { position: absolute; top: 16px; right: 16px; background: transparent; border: 1px solid var(--border); color: var(--muted); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all .2s; }
    .modal-close-x:hover { border-color: var(--accent2); color: var(--accent2); }
    .modal-wrap { position: relative; }

    /* ── HERO ── */
    .hero { padding: 64px 0 40px; text-align: center; }
    .hero-eyebrow { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 20px; opacity: 0; animation: fadeUp .5s ease forwards .1s; }
    .hero h1 { font-size: clamp(44px, 8vw, 84px); font-weight: 800; line-height: 1; letter-spacing: -3px; opacity: 0; animation: fadeUp .5s ease forwards .2s; }
    .hero h1 span { color: var(--accent); }
    .hero p { margin-top: 18px; color: var(--muted); font-size: 16px; opacity: 0; animation: fadeUp .5s ease forwards .3s; }

    /* ── SHORTEN CARD ── */
    .shorten-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px 32px; opacity: 0; animation: fadeUp .5s ease forwards .4s; }
    .form-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .form-row.two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .input-wrap { flex: 1; }
    .input-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; display: block; }
    input[type="text"], input[type="url"], input[type="email"], input[type="password"] { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 13px 14px; border-radius: var(--radius); font-family: 'DM Mono', monospace; font-size: 14px; transition: border-color .2s, box-shadow .2s; outline: none; }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,255,71,.08); }
    input::placeholder { color: var(--muted); }
    input[readonly] { color: var(--muted); cursor: default; }
    .btn-shorten { background: var(--accent); color: #0a0a0a; border: none; padding: 13px 28px; border-radius: var(--radius); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all .2s; }
    .btn-shorten:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,255,71,.25); }
    .btn-shorten:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    /* ── LOGIN GATE ── */
    .login-gate { background: rgba(232,255,71,.04); border: 1px dashed rgba(232,255,71,.25); border-radius: var(--radius); padding: 20px; text-align: center; margin-top: 12px; }
    .login-gate p { color: var(--muted); font-size: 14px; margin-bottom: 12px; }
    .login-gate button { background: var(--accent); color: #0a0a0a; border: none; padding: 10px 24px; border-radius: var(--radius); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; }

    /* ── RESULT ── */
    .result-box { background: #0f1a00; border: 1px solid rgba(232,255,71,.3); border-radius: var(--radius); padding: 14px 18px; display: none; align-items: center; justify-content: space-between; gap: 12px; margin-top: 14px; animation: fadeUp .3s ease; }
    .result-box.show { display: flex; }
    .result-url { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--accent); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .result-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-copy, .btn-open { padding: 8px 14px; border-radius: var(--radius); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .2s; }
    .btn-copy { background: var(--accent); color: #0a0a0a; border: none; }
    .btn-open { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-open:hover { border-color: var(--accent); color: var(--accent); }

    .error-box { background: rgba(255,71,87,.08); border: 1px solid rgba(255,71,87,.3); border-radius: var(--radius); padding: 11px 14px; color: var(--accent2); font-size: 13px; margin-top: 10px; display: none; }
    .error-box.show { display: block; }

    /* ── SECTION ── */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; margin-top: 44px; }
    .section-title { font-size: 20px; font-weight: 700; }
    .search-input { width: 220px; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 9px 13px; border-radius: var(--radius); font-family: 'DM Mono', monospace; font-size: 13px; outline: none; transition: border-color .2s; }
    .search-input:focus { border-color: var(--accent); }

    /* ── URL CARDS ── */
    .urls-list { display: flex; flex-direction: column; gap: 8px; padding-bottom: 60px; }
    .url-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px 18px; display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; transition: border-color .2s; animation: fadeUp .3s ease; }
    .url-card:hover { border-color: #333; }
    .url-card-short { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--accent); margin-bottom: 3px; }
    .url-card-original { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .url-card-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 5px; display: flex; gap: 14px; }
    .url-card-actions { display: flex; gap: 6px; }
    .btn-sm { padding: 7px 13px; border-radius: var(--radius); font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; border: 1px solid var(--border); background: transparent; color: var(--muted); }
    .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
    .btn-sm.danger:hover { border-color: var(--accent2); color: var(--accent2); }

    /* ── STATS MODAL ── */
    .stats-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px; width: 100%; max-width: 580px; max-height: 90vh; overflow-y: auto; animation: fadeUp .3s ease; position: relative; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .modal-title { font-size: 20px; font-weight: 700; }
    .btn-close { background: transparent; border: 1px solid var(--border); color: var(--muted); width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 17px; display: flex; align-items: center; justify-content: center; transition: all .2s; }
    .btn-close:hover { border-color: var(--accent2); color: var(--accent2); }

    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
    .stat-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; }
    .stat-value { font-size: 26px; font-weight: 800; color: var(--accent); margin-bottom: 3px; }
    .stat-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .modal-url-section { margin-bottom: 16px; }
    .modal-url-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
    .modal-url-val { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text); word-break: break-all; }
    .modal-url-val a { color: var(--accent); text-decoration: none; }
    .modal-url-val a:hover { text-decoration: underline; }
    .chart-title { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }
    .bar-chart { display: flex; align-items: flex-end; gap: 3px; height: 72px; }
    .bar-chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; }
    .bar { width: 100%; background: var(--accent); border-radius: 3px 3px 0 0; min-height: 2px; }
    .bar:hover { opacity: .75; }
    .bar-label { font-family: 'DM Mono', monospace; font-size: 8px; color: var(--muted); }

    /* ── EMPTY ── */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 44px; margin-bottom: 12px; }
    .empty-state h3 { color: var(--text); margin-bottom: 6px; }
    .empty-state p { font-size: 14px; }

    /* ── SPINNER ── */
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(0,0,0,.2); border-top-color: #0a0a0a; border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--accent); color: #0a0a0a; padding: 11px 18px; border-radius: var(--radius); font-weight: 700; font-size: 14px; transform: translateY(80px); opacity: 0; transition: all .3s cubic-bezier(.34,1.56,.64,1); z-index: 200; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { background: var(--accent2); color: #fff; }

    @media (max-width: 600px) {
      .form-row { flex-direction: column; }
      .form-row.two { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .url-card { grid-template-columns: 1fr; }
      nav { display: none; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- ── HEADER ── -->
  <header>
    <div class="logo" onclick="showView('home')">
      <span class="logo-dot"></span> SNIP
    </div>
    <div class="header-right">
      <nav id="mainNav">
        <button class="nav-btn active" onclick="showView('home', this)">Shorten</button>
        <button class="nav-btn" onclick="showView('manage', this)">My Links</button>
      </nav>
      <div id="userArea"></div>
    </div>
  </header>

  <!-- ── HOME VIEW ── -->
  <div id="view-home" class="view active">
    <div class="hero">
      <p class="hero-eyebrow">// url shortener</p>
      <h1>Make it<br /><span>short.</span></h1>
      <p>Paste a long URL. Get a clean, shareable link instantly.</p>
    </div>

    <div class="shorten-card">
      <div class="form-row">
        <div class="input-wrap">
          <label class="input-label">Long URL</label>
          <input type="url" id="urlInput" placeholder="https://example.com/very/long/path/..." />
        </div>
        <div style="display:flex;align-items:flex-end;">
          <button class="btn-shorten" id="shortenBtn" onclick="shortenUrl()">Shorten →</button>
        </div>
      </div>
      <div class="form-row two">
        <div class="input-wrap">
          <label class="input-label">Custom Slug (optional)</label>
          <input type="text" id="slugInput" placeholder="my-cool-link" oninput="updatePreview()" />
        </div>
        <div class="input-wrap">
          <label class="input-label">Preview</label>
          <input type="text" id="previewInput" readonly placeholder="localhost:3000/..." />
        </div>
      </div>

      <!-- Login gate shown when logged out -->
      <div id="loginGate" class="login-gate" style="display:none;">
        <p>Sign in to create and manage your short links.</p>
        <button onclick="openAuth('login')">Sign In / Register →</button>
      </div>

      <div class="error-box" id="errorBox"></div>
      <div class="result-box" id="resultBox">
        <span class="result-url" id="resultUrl"></span>
        <div class="result-actions">
          <button class="btn-copy" onclick="copyResult()">Copy</button>
          <button class="btn-open" onclick="openResult()">Open ↗</button>
        </div>
      </div>
    </div>

    <div id="recentSection" style="display:none;">
      <div class="section-header">
        <h2 class="section-title">Recent Links</h2>
        <button class="nav-btn" onclick="showView('manage')">View All →</button>
      </div>
      <div class="urls-list" id="recentList"></div>
    </div>
  </div>

  <!-- ── MANAGE VIEW ── -->
  <div id="view-manage" class="view">
    <div class="section-header">
      <h2 class="section-title">My Links</h2>
      <input class="search-input" type="text" id="searchInput" placeholder="Search..." oninput="searchUrls(this.value)" />
    </div>
    <div class="urls-list" id="urlsList"></div>
  </div>

</div><!-- /container -->

<!-- ── AUTH MODAL ── -->
<div class="modal-overlay" id="authModal">
  <div class="modal-wrap">
    <div class="modal">
      <div class="modal-logo">🔗 SNIP</div>
      <p class="modal-sub">Your links. Your data.</p>

      <div class="modal-tabs">
        <button class="modal-tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
        <button class="modal-tab" id="tabRegister" onclick="switchTab('register')">Register</button>
      </div>

      <div class="auth-error" id="authError"></div>

      <!-- Sign In Form -->
      <div id="formLogin">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')submitLogin()" />
        </div>
        <button class="btn-primary" id="loginBtn" onclick="submitLogin()">Sign In</button>
        <div class="divider-or">or</div>
        <button class="btn-google" onclick="googleLogin()">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>
      </div>

      <!-- Register Form -->
      <div id="formRegister" style="display:none;">
        <div class="form-group">
          <label class="form-label">Name</label>
          <input class="form-input" type="text" id="regName" placeholder="Your name" autocomplete="name" />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" id="regEmail" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" id="regPass" placeholder="Min 8 characters" autocomplete="new-password" onkeydown="if(event.key==='Enter')submitRegister()" />
        </div>
        <button class="btn-primary" id="registerBtn" onclick="submitRegister()">Create Account</button>
        <div class="divider-or">or</div>
        <button class="btn-google" onclick="googleLogin()">
          <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Sign up with Google
        </button>
      </div>
    </div>
    <button class="modal-close-x" onclick="closeAuth()">×</button>
  </div>
</div>

<!-- ── STATS MODAL ── -->
<div class="modal-overlay" id="statsModal" onclick="closeStatsModal(event)">
  <div class="stats-modal">
    <div class="modal-header">
      <h3 class="modal-title">Link Analytics</h3>
      <button class="btn-close" onclick="closeStatsModal()">×</button>
    </div>
    <div id="statsContent"></div>
  </div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
// AUTH STATE
// ═══════════════════════════════════════════════════════════
let accessToken = null;
let currentUser = null;
let currentResult = null;
let searchDebounce = null;

// ─── Token helpers ──────────────────────────────────────────
function saveToken(t) {
  accessToken = t;
  sessionStorage.setItem("snip_token", t);
}
function loadToken() {
  accessToken = sessionStorage.getItem("snip_token");
}
function clearToken() {
  accessToken = null;
  sessionStorage.removeItem("snip_token");
}

function authHeaders() {
  return accessToken ? { Authorization: `Bearer ${accessToken}` } : {};
}

// ─── API wrapper with silent refresh ───────────────────────
async function api(path, opts = {}) {
  opts.headers = { "Content-Type": "application/json", ...authHeaders(), ...(opts.headers || {}) };
  let res = await fetch(path, opts);

  // Try to refresh if 401
  if (res.status === 401 && accessToken) {
    const ok = await tryRefresh();
    if (ok) {
      opts.headers = { "Content-Type": "application/json", ...authHeaders(), ...(opts.headers || {}) };
      res = await fetch(path, opts);
    } else {
      logout(true);
      return res;
    }
  }
  return res;
}

async function tryRefresh() {
  try {
    const r = await fetch("/api/auth/refresh", { method: "POST", credentials: "include" });
    if (!r.ok) return false;
    const d = await r.json();
    saveToken(d.accessToken);
    currentUser = d.user;
    return true;
  } catch { return false; }
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
async function init() {
  loadToken();

  // Handle Google OAuth redirect token
  const params = new URLSearchParams(location.search);
  if (params.get("token")) {
    saveToken(params.get("token"));
    history.replaceState({}, "", "/");
  }
  if (params.get("auth") === "error") {
    toast("Google sign-in failed", true);
    history.replaceState({}, "", "/");
  }

  if (accessToken) {
    const ok = await fetchMe();
    if (!ok) await tryRefresh().then(r => r && fetchMe());
  }

  renderUserArea();
  renderShortenCard();
  loadRecent();
}

async function fetchMe() {
  try {
    const r = await api("/api/auth/me");
    if (!r.ok) return false;
    currentUser = await r.json();
    return true;
  } catch { return false; }
}

// ═══════════════════════════════════════════════════════════
// UI RENDERING
// ═══════════════════════════════════════════════════════════
function renderUserArea() {
  const area = document.getElementById("userArea");
  if (!currentUser) {
    area.innerHTML = `<button class="btn-login" onclick="openAuth('login')">Sign In</button>`;
    return;
  }
  const initials = currentUser.name.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
  area.innerHTML = `
    <div class="user-chip" onclick="toggleDropdown()">
      <div class="user-avatar">
        ${currentUser.avatar
          ? `<img src="${currentUser.avatar}" alt="" onerror="this.parentElement.textContent='${initials}'">`
          : initials}
      </div>
      <span class="user-name">${currentUser.name}</span>
      <div class="dropdown" id="userDropdown">
        <div style="padding:12px 16px 8px;border-bottom:1px solid var(--border)">
          <div style="font-size:13px;font-weight:700">${currentUser.name}</div>
          <div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;">${currentUser.email}</div>
        </div>
        <button class="dropdown-item" onclick="showView('manage')">My Links</button>
        <hr class="dropdown-divider">
        <button class="dropdown-item danger" onclick="logout()">Sign Out</button>
      </div>
    </div>`;
}

function toggleDropdown() {
  document.getElementById("userDropdown")?.classList.toggle("open");
}
document.addEventListener("click", e => {
  if (!e.target.closest(".user-chip")) document.getElementById("userDropdown")?.classList.remove("open");
});

function renderShortenCard() {
  const gate = document.getElementById("loginGate");
  const btn  = document.getElementById("shortenBtn");
  const inputs = document.querySelectorAll("#urlInput, #slugInput");
  if (currentUser) {
    gate.style.display = "none";
    btn.style.display  = "";
    inputs.forEach(i => i.disabled = false);
  } else {
    gate.style.display = "block";
    btn.style.display  = "none";
    inputs.forEach(i => i.disabled = true);
  }
}

// ═══════════════════════════════════════════════════════════
// AUTH MODAL
// ═══════════════════════════════════════════════════════════
function openAuth(tab = "login") {
  document.getElementById("authModal").classList.add("show");
  switchTab(tab);
  clearAuthError();
}

function closeAuth() {
  document.getElementById("authModal").classList.remove("show");
}

document.getElementById("authModal").addEventListener("click", e => {
  if (e.target === document.getElementById("authModal")) closeAuth();
});

function switchTab(t) {
  document.getElementById("formLogin").style.display    = t === "login"    ? "" : "none";
  document.getElementById("formRegister").style.display = t === "register" ? "" : "none";
  document.getElementById("tabLogin").classList.toggle("active",    t === "login");
  document.getElementById("tabRegister").classList.toggle("active", t === "register");
  clearAuthError();
}

function showAuthError(msg) {
  const el = document.getElementById("authError");
  el.textContent = msg;
  el.classList.add("show");
}
function clearAuthError() {
  document.getElementById("authError").classList.remove("show");
}

// ─── Register ──────────────────────────────────────────────
async function submitRegister() {
  const name  = document.getElementById("regName").value.trim();
  const email = document.getElementById("regEmail").value.trim();
  const pass  = document.getElementById("regPass").value;
  const btn   = document.getElementById("registerBtn");

  clearAuthError();
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  try {
    const r = await fetch("/api/auth/register", {
      method: "POST", credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, password: pass }),
    });
    const d = await r.json();
    if (!r.ok) { showAuthError(d.error); return; }
    saveToken(d.accessToken);
    currentUser = d.user;
    closeAuth();
    renderUserArea();
    renderShortenCard();
    toast(`Welcome, ${currentUser.name}! 🎉`);
    loadRecent();
  } catch { showAuthError("Network error"); }
  finally { btn.disabled = false; btn.innerHTML = "Create Account"; }
}

// ─── Login ─────────────────────────────────────────────────
async function submitLogin() {
  const email = document.getElementById("loginEmail").value.trim();
  const pass  = document.getElementById("loginPass").value;
  const btn   = document.getElementById("loginBtn");

  clearAuthError();
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  try {
    const r = await fetch("/api/auth/login", {
      method: "POST", credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password: pass }),
    });
    const d = await r.json();
    if (!r.ok) { showAuthError(d.error); return; }
    saveToken(d.accessToken);
    currentUser = d.user;
    closeAuth();
    renderUserArea();
    renderShortenCard();
    toast(`Welcome back, ${currentUser.name}!`);
    loadRecent();
  } catch { showAuthError("Network error"); }
  finally { btn.disabled = false; btn.innerHTML = "Sign In"; }
}

// ─── Google OAuth ──────────────────────────────────────────
function googleLogin() {
  window.location.href = "/api/auth/google";
}

// ─── Logout ────────────────────────────────────────────────
async function logout(silent = false) {
  await fetch("/api/auth/logout", { method: "POST", credentials: "include" });
  clearToken();
  currentUser = null;
  document.getElementById("userDropdown")?.classList.remove("open");
  renderUserArea();
  renderShortenCard();
  document.getElementById("recentSection").style.display = "none";
  document.getElementById("recentList").innerHTML = "";
  if (!silent) toast("Signed out");
}

// ═══════════════════════════════════════════════════════════
// VIEWS
// ═══════════════════════════════════════════════════════════
function showView(name, btn) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById(`view-${name}`).classList.add("active");
  if (btn) btn.classList.add("active");
  else document.querySelector(`.nav-btn[onclick*="${name}"]`)?.classList.add("active");
  if (name === "manage") loadAllUrls();
  if (name === "home") loadRecent();
}

// ═══════════════════════════════════════════════════════════
// SHORTEN
// ═══════════════════════════════════════════════════════════
function updatePreview() {
  const val = document.getElementById("slugInput").value.trim();
  document.getElementById("previewInput").value = val ? `${location.host}/${val}` : "";
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("urlInput").addEventListener("keydown", e => {
    if (e.key === "Enter") shortenUrl();
  });
});

async function shortenUrl() {
  if (!currentUser) { openAuth("login"); return; }

  const url  = document.getElementById("urlInput").value.trim();
  const slug = document.getElementById("slugInput").value.trim();
  const btn  = document.getElementById("shortenBtn");
  const errBox    = document.getElementById("errorBox");
  const resultBox = document.getElementById("resultBox");

  errBox.classList.remove("show");
  resultBox.classList.remove("show");

  if (!url) { showShortError("Please enter a URL"); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  try {
    const r = await api("/api/shorten", {
      method: "POST",
      body: JSON.stringify({ url, customSlug: slug || undefined }),
    });
    const d = await r.json();
    if (!r.ok) { showShortError(d.error); return; }

    currentResult = d;
    document.getElementById("resultUrl").textContent = d.shortUrl;
    resultBox.classList.add("show");
    loadRecent();
    toast(d.reused ? "↩ Already shortened!" : "✓ Link created!");
  } catch { showShortError("Network error — is the server running?"); }
  finally { btn.disabled = false; btn.innerHTML = "Shorten →"; }
}

function showShortError(msg) {
  const b = document.getElementById("errorBox");
  b.textContent = msg; b.classList.add("show");
}

function copyResult() {
  if (!currentResult) return;
  navigator.clipboard.writeText(currentResult.shortUrl).then(() => toast("✓ Copied!"));
}
function openResult() {
  if (!currentResult) return;
  window.open(currentResult.shortUrl, "_blank");
}

// ═══════════════════════════════════════════════════════════
// URL LISTS
// ═══════════════════════════════════════════════════════════
async function loadRecent() {
  if (!currentUser) return;
  try {
    const r = await api("/api/urls");
    if (!r.ok) return;
    const data = await r.json();
    const sec = document.getElementById("recentSection");
    const list = document.getElementById("recentList");
    if (!data.length) { sec.style.display = "none"; return; }
    sec.style.display = "";
    list.innerHTML = data.slice(0, 5).map(urlCard).join("");
  } catch {}
}

async function loadAllUrls(query = "") {
  if (!currentUser) {
    document.getElementById("urlsList").innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔐</div>
        <h3>Sign in to see your links</h3>
        <p><button onclick="openAuth('login')" style="background:var(--accent);color:#0a0a0a;border:none;padding:9px 20px;border-radius:var(--radius);font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;margin-top:8px;">Sign In</button></p>
      </div>`;
    return;
  }
  const list = document.getElementById("urlsList");
  list.innerHTML = `<div style="color:var(--muted);padding:20px;text-align:center;">Loading...</div>`;
  try {
    const q = query ? `?q=${encodeURIComponent(query)}` : "";
    const r = await api(`/api/urls${q}`);
    const data = await r.json();
    if (!data.length) {
      list.innerHTML = `<div class="empty-state">
        <div class="empty-icon">${query ? "🔍" : "🔗"}</div>
        <h3>${query ? "No results found" : "No links yet"}</h3>
        <p>${query ? "Try a different search" : "Create your first short link above"}</p>
      </div>`;
      return;
    }
    list.innerHTML = data.map(urlCard).join("");
  } catch {
    list.innerHTML = `<div class="empty-state"><h3>Error loading links</h3><p>Is the server running?</p></div>`;
  }
}

function urlCard(u) {
  const shortUrl = `${location.protocol}//${location.host}/${u.short_code}`;
  const date = new Date(u.created_at).toLocaleDateString("en-US", { month: "short", day: "numeric" });
  return `<div class="url-card">
    <div class="url-card-left">
      <div class="url-card-short">${shortUrl}</div>
      <div class="url-card-original" title="${u.original}">${u.original}</div>
      <div class="url-card-meta">
        <span>📊 ${u.clicks} click${u.clicks !== 1 ? "s" : ""}</span>
        <span>📅 ${date}</span>
      </div>
    </div>
    <div class="url-card-actions">
      <button class="btn-sm" onclick="copyLink('${shortUrl}')">Copy</button>
      <button class="btn-sm" onclick="showStats('${u.short_code}')">Stats</button>
      <button class="btn-sm danger" onclick="deleteUrl('${u.short_code}', this)">Delete</button>
    </div>
  </div>`;
}

function searchUrls(val) {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => loadAllUrls(val), 300);
}

function copyLink(url) {
  navigator.clipboard.writeText(url).then(() => toast("✓ Copied!"));
}

async function deleteUrl(code, btn) {
  if (!confirm(`Delete /${code}? This cannot be undone.`)) return;
  try {
    const r = await api(`/api/urls/${code}`, { method: "DELETE" });
    if (r.ok) {
      const card = btn.closest(".url-card");
      card.style.opacity = "0";
      card.style.transition = "opacity .2s";
      setTimeout(() => { card.remove(); toast("✓ Deleted"); }, 200);
    } else {
      toast("Failed to delete", true);
    }
  } catch { toast("Error", true); }
}

// ═══════════════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════════════
async function showStats(code) {
  const modal   = document.getElementById("statsModal");
  const content = document.getElementById("statsContent");
  content.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted);">Loading...</div>`;
  modal.classList.add("show");

  try {
    const r = await api(`/api/urls/${code}/stats`);
    const s = await r.json();
    const shortUrl  = `${location.protocol}//${location.host}/${s.short_code}`;
    const created   = new Date(s.created_at).toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
    const lastClick = s.last_clicked
      ? new Date(s.last_clicked).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })
      : "Never";

    content.innerHTML = `
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-value">${s.clicks}</div><div class="stat-label">Total Clicks</div></div>
        <div class="stat-box"><div class="stat-value">${s.clicksOverTime?.length || 0}</div><div class="stat-label">Active Days</div></div>
        <div class="stat-box"><div class="stat-value" style="font-size:13px;padding-top:7px;">${lastClick}</div><div class="stat-label">Last Click</div></div>
      </div>
      <div class="modal-url-section">
        <div class="modal-url-label">Short URL</div>
        <div class="modal-url-val"><a href="${shortUrl}" target="_blank">${shortUrl}</a></div>
      </div>
      <div class="modal-url-section">
        <div class="modal-url-label">Original URL</div>
        <div class="modal-url-val"><a href="${s.original}" target="_blank" rel="noopener">${s.original}</a></div>
      </div>
      <div class="modal-url-section">
        <div class="modal-url-label">Created</div>
        <div class="modal-url-val">${created}</div>
      </div>
      ${s.clicksOverTime?.length ? `
      <div>
        <div class="chart-title">Clicks — Last 30 Days</div>
        ${buildChart(s.clicksOverTime)}
      </div>` : ""}
    `;
  } catch {
    content.innerHTML = `<div style="text-align:center;padding:40px;color:var(--accent2);">Failed to load stats</div>`;
  }
}

function buildChart(data) {
  if (!data.length) return "";
  const max = Math.max(...data.map(d => d.count), 1);
  return `<div class="bar-chart">${
    [...data].reverse().slice(0, 14).map(d => `
      <div class="bar-chart-col">
        <div class="bar" style="height:${Math.max((d.count/max)*100,3)}%" title="${d.count} clicks on ${d.day}"></div>
        <div class="bar-label">${d.day.slice(5)}</div>
      </div>`).join("")
  }</div>`;
}

function closeStatsModal(e) {
  if (!e || e.target === document.getElementById("statsModal")) {
    document.getElementById("statsModal").classList.remove("show");
  }
}

// ═══════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════
let toastTimer;
function toast(msg, isError = false) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.toggle("error", isError);
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2800);
}

// ═══════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════
init();
</script>
</body>
</html>
